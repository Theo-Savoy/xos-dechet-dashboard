<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>XOS Portal</title>
</head>
<body style="margin:0;padding:0;background:#050a1c;-webkit-text-size-adjust:100%;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
    Votre accès XOS Portal est prêt.
  </div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#050a1c;width:100%;">
    <tr>
      <td align="center" style="padding:48px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:480px;width:100%;">

          <tr>
            <td align="center" style="padding:0 0 36px;">
              <img
                src="https://xos.hellotheo.fr/email/logo-xos.png"
                width="132"
                alt="XOS Portal"
                style="display:block;width:132px;max-width:48%;height:auto;border:0;"
              />
            </td>
          </tr>

          <tr>
            <td style="border-radius:24px;overflow:hidden;background:#0d173f;border:1px solid rgba(255,255,255,0.09);">
              <!-- soft glow strip -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="height:3px;background:linear-gradient(90deg,#8b5bfa 0%,#fff96f 100%);font-size:0;line-height:0;">&nbsp;</td>
                </tr>
                <tr>
                  <td style="padding:40px 36px 12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
                    <p style="margin:0 0 18px;color:#f4f5fb;font-size:22px;line-height:1.35;font-weight:650;">
                      Hey,&nbsp;c’est l’heure.
                    </p>
                    <p style="margin:0;color:rgba(244,245,251,0.72);font-size:15px;line-height:1.65;">
                      Ton bureau XOS Portal t’attend.
                      Un clic et tu es dedans — pas de mot de passe, juste ce lien.
                    </p>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding:28px 36px 40px;">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td align="center" style="border-radius:999px;background:#8b5bfa;">
                          <a
                            href="{{ .ConfirmationURL }}"
                            target="_blank"
                            style="display:inline-block;padding:14px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;font-weight:700;letter-spacing:0.02em;color:#ffffff;text-decoration:none;border-radius:999px;"
                          >
                            Entrer dans le portal
                          </a>
                        </td>
                      </tr>
                    </table>
                    <p style="margin:22px 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:rgba(244,245,251,0.38);font-size:12px;line-height:1.5;">
                      Le lien expire vite — comme une bonne soirée.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding:28px 8px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
              <p style="margin:0;color:rgba(244,245,251,0.28);font-size:11px;letter-spacing:0.04em;">
                XOS Portal · xos@hellotheo.fr
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
